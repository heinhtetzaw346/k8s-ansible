---
# vars file for node-network
sysctl_configs:
  net.ipv4.ip_forward: "1"
  net.ipv6.conf.all.forwarding: "1"
  net.bridge.bridge-nf-call-ip6tables: "1"
  net.bridge.bridge-nf-call-iptables: "1"
base_kernel_modules:
  - overlay
  - br_netfilter
ipvs_kernel_modules:
  - ip_vs
  - ip_vs_rr
  - ip_vs_wrr
  - ip_vs_sh
  - nf_conntrack
ipvs_pkg_name: "ipvsadm"
