- name: Disable swap
  become: true
  tags: [ node_preflight, swap ]
  block:
    - name: Run swapoff
      when: ansible_swaptotal_mb > 0
      ansible.builtin.command: swapoff -a

    - name: Edit fstab
      ansible.builtin.replace:
        path: "{{ fstab_path }}"
        regexp: '^([^#].*\bswap\b.*)$'
        replace: '# \1'
        backup: true
