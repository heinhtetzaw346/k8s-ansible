- name: Containerd Installation and Setup
  become: true
  tags: [ container-runtime ]
  block:
    - name: Get Docker-CE Repo Key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker-CE Repo for Containerd
      ansible.builtin.apt_repository:
        repo: >
          deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        filename: docker-ce
        state: present

    - name: Install Containerd
      ansible.builtin.package:
        name: containerd.io={{ containerd_version + "*" }}
        state: present
        update_cache: true

    - name: Exclude containerd from updates
      ansible.builtin.dpkg_selections:
        name: containerd.io
        selection: hold

    - name: Start and Enable containerd
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true
