---
# tasks file for node-storage

- name: Load common variables
  ansible.builtin.include_vars: "common.yml"
  tags: [ always ]

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      skip: true
  tags: [ always ]

- name: Include ISCSI
  when: iscsi_enabled | bool
  ansible.builtin.include_tasks: "iscsi.yml"
  tags: [ always ]

- name: Include NFS
  when: nfs_enabled | bool
  ansible.builtin.include_tasks: "nfs.yml"
  tags: [ always ]
