- name: Control Plane Init
  when: inventory_hostname == groups['k8s_control_plane'][0]
  become: true
  block:
    - name: Write kubeadm config file on first control_plane
      when:
        - not kubernetes_joined
      ansible.builtin.template:
        src: kubeadm-config.yml.j2
        dest: /etc/kubernetes/kubeadm-config.yml
        owner: root
        group: root
        mode: "0644"

    - name: Initialize on first control_plane
      when:
        - not kubernetes_joined
      ansible.builtin.command: kubeadm init --upload-certs --config=/etc/kubernetes/kubeadm-config.yml

    - name: Contro Plane certificate key tasks
      when: not ( groups["k8s_control_plane"] | length == 1 )
      block:
        - name: Generate control plane certificate key
          ansible.builtin.shell: "python3 -c 'import os; print(os.urandom(32).hex())'"
          register: generated_cert_key
          changed_when: false

        - name: Save certificate key
          ansible.builtin.set_fact:
            cert_key: "{{ generated_cert_key.stdout }}"

        - name: Upload cert with generated certificate key
          ansible.builtin.command: kubeadm init phase upload-certs --upload-certs --certificate-key {{ cert_key }}
          register: certificate_key

    - name: Generate join token
      ansible.builtin.command: kubeadm token generate
      register: join_token

    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command {{ join_token.stdout }}
      register: join_command

    - name: Save join token 
      ansible.builtin.set_fact:
        join_tkn: "{{ join_token.stdout }}"

    - name: Save join command
      ansible.builtin.set_fact:
        join_cmd: "{{ join_command.stdout }}"

