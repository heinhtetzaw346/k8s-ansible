- name: Control Plane Init
  become: true
  block:
    - name: Initialize on first control_plane
      when:
        - inventory_hostname == groups['k8s_control_plane'][0]
        - not kubernetes_joined
      ansible.builtin.command: >
        kubeadm init
        --upload-certs
        --cri-socket=unix:///var/run/{{ container_runtime }}/{{ container_runtime }}.sock
        {{ '--image-repository=' + kubernetes_registry_mirror if kubernetes_registry_mirror else '' }}
        {{ '--pod-network-cidr=' + pod_network_cidr if pod_network_cidr else '' }}
        {{ '--service-cidr=' + service_network_cidr if service_network_cidr else '' }}
        {{ '--control-plane-endpoint=' + control_plane_endpoint if control_plane_endpoint else '' }}
        {{ '--service-dns-domain=' + cluster_dns_domain if cluster_dns_domain else '' }}

    - name: Generate join token
      when: inventory_hostname == groups['k8s_control_plane'][0]
      ansible.builtin.command: kubeadm token generate
      register: join_token

    - name: Generate join command
      when: inventory_hostname == groups['k8s_control_plane'][0]
      ansible.builtin.command: kubeadm token create --print-join-command {{ join_token.stdout }}
      register: join_command

    - name: Save join token 
      when: inventory_hostname == groups['k8s_control_plane'][0]
      ansible.builtin.set_fact:
        join_tkn: "{{ join_token.stdout }}"

    - name: Save join command
      when: inventory_hostname == groups['k8s_control_plane'][0]
      ansible.builtin.set_fact:
        join_cmd: "{{ join_command.stdout }}"
